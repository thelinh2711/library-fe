name: FE CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        id: vars
        run: echo "TAG=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_OAUTH_URL=${{ secrets.VITE_OAUTH_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/library-fe-app:${{ steps.vars.outputs.TAG }} \
            -t ${{ secrets.DOCKER_USERNAME }}/library-fe-app:latest \
            .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/library-fe-app:${{ steps.vars.outputs.TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/library-fe-app:latest